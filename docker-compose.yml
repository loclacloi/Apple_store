version: '3.8'

services:
  # 1. Database MongoDB
  mongodb:
    image: mongo:latest
    container_name: apple_store_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  # 2. Giao diện quản lý Database (Thay thế cho MongoDB Compass)
  mongo-express:
    image: mongo-express:latest
    container_name: apple_store_mongo_express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password
    depends_on:
      - mongodb

volumes:
  mongodb_data:
